services:
  - type: web
    name: sudoclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: SUDOCLAW_STATE_DIR
        value: /data/.sudoclaw
      - key: SUDOCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: SUDOCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: sudoclaw-data
      mountPath: /data
      sizeGB: 1
